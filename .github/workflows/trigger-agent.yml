name: Trigger Workspace Agent

on:
  issues:
    types: [labeled]

permissions:
  contents: read

jobs:
  trigger:
    if: >-
      (contains(github.event.issue.labels.*.name, 'agent')) &&
      (contains(github.event.issue.labels.*.name, 'enhancement') || contains(github.event.issue.labels.*.name, 'bug'))
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: cartridge-gg

      - name: Dispatch to workspace
        id: dispatch
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail

          # Detect label type
          if [[ "$(echo "${{ github.event.issue.labels.*.name }}" | grep -o 'bug')" ]]; then
            EVENT_TYPE="agent-trigger-bug"
          else
            EVENT_TYPE="agent-trigger-enhancement"
          fi

          echo "Triggering $EVENT_TYPE in cartridge-gg/workspace..."

          curl -L -X POST             -H "Accept: application/vnd.github+json"             -H "Authorization: Bearer ${GH_TOKEN}"             -H "X-GitHub-Api-Version: 2022-11-28"             https://api.github.com/repos/cartridge-gg/workspace/dispatches             -d "{"event_type": "${EVENT_TYPE}", "client_payload": {"issue_number": ${{ github.event.issue.number }}, "repo_slug": "${{ github.repository }}"}}"
