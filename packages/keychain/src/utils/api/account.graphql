query Account($username: String!) {
  account(username: $username) {
    username
    credentials {
      webauthn {
        id
        publicKey
      }
    }
    controllers {
      edges {
        node {
          address
          constructorCalldata
          signers {
            type
          }
        }
      }
    }
  }
}

query Credit($username: String!) {
  account(username: $username) {
    credits {
      amount
      decimals
    }
  }
}

query CreditsHistory($username: String!, $first: Int, $after: Cursor) {
  account(username: $username) {
    creditsHistory(
      first: $first
      after: $after
      orderBy: { field: CREATED_AT, direction: DESC }
    ) {
      totalCount
      pageInfo {
        hasNextPage
        endCursor
      }
      edges {
        node {
          id
          amount
          transactionType
          paymentMethod
          transactionHash
          comment
          createdAt
        }
      }
    }
  }
}

query AccountName($address: String!) {
  accounts(where: { hasControllersWith: { address: $address } }, first: 1) {
    edges {
      node {
        username
      }
    }
  }
}

query AccountNames($addresses: [String!]!) {
  accounts(where: { hasControllersWith: { addressIn: $addresses } }) {
    edges {
      node {
        username
        controllers {
          edges {
            node {
              address
            }
          }
        }
      }
    }
  }
}

query AddressByUsername($username: String!) {
  account(username: $username) {
    controllers(first: 1) {
      edges {
        node {
          address
        }
      }
    }
  }
}

query AccountPrivate {
  accountPrivate {
    phoneNumber
    phoneNumberVerifiedAt
    firstName
    lastName
    dob
    proveVerifiedAt
    verificationStatus
  }
}

query AccountSearch($query: String!, $limit: Int = 5) {
  searchAccounts(query: $query, limit: $limit) {
    username
    credits {
      amount
      decimals
    }
    updatedAt
  }
}

mutation AccountVerify($input: AccountVerifyInput!) {
  accountVerify(input: $input) {
    verified
    reasonCode
    retryable
    correlationId
  }
}

mutation DeleteMe {
  deleteMe
}

mutation DeleteEmailAddress {
  deleteEmailAddress
}

mutation DeletePhoneNumber {
  deletePhoneNumber
}

mutation DeleteProveIdentity {
  deleteProveIdentity
}
