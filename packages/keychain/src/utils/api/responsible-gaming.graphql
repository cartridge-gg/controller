fragment ResponsibleGamingFields on ResponsibleGamingStatus {
  period
  windowStart
  deposit {
    amountCents
    usedCents
    pendingAmountCents
    pendingRemoval
  }
  spending {
    amountCents
    usedCents
    pendingAmountCents
    pendingRemoval
  }
  sessionMaxDurationSeconds
  pendingSessionMaxDurationSeconds
  pendingSessionRemoval
  pendingEffectiveAt
}

query ResponsibleGaming {
  responsibleGaming {
    ...ResponsibleGamingFields
  }
}

mutation UpdateResponsibleGamingLimits(
  $input: UpdateResponsibleGamingLimitsInput!
) {
  updateResponsibleGamingLimits(input: $input) {
    ...ResponsibleGamingFields
  }
}

fragment ResponsibleGamingSpendFields on ResponsibleGamingSpendReservation {
  reference
  amountCents
  state
}

mutation ReserveResponsibleGamingSpend(
  $reference: String!
  $amountCents: Int!
) {
  reserveResponsibleGamingSpend(
    reference: $reference
    amountCents: $amountCents
  ) {
    ...ResponsibleGamingSpendFields
  }
}

mutation SettleResponsibleGamingSpend($reference: String!) {
  settleResponsibleGamingSpend(reference: $reference) {
    ...ResponsibleGamingSpendFields
  }
}

mutation ReleaseResponsibleGamingSpend($reference: String!) {
  releaseResponsibleGamingSpend(reference: $reference) {
    ...ResponsibleGamingSpendFields
  }
}
