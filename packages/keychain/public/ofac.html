<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Unavailable in Your Region</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f4f4f5;
        color: #18181b;
        font-family:
          "Helvetica Neue",
          Helvetica,
          Arial,
          sans-serif;
      }
      main {
        max-width: 640px;
        margin: 24px;
        padding: 28px;
        background: #ffffff;
        border: 1px solid #e4e4e7;
        border-radius: 12px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 24px;
        line-height: 1.2;
      }
      p {
        margin: 0;
        font-size: 16px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Service unavailable in your region</h1>
      <p>
        Access is restricted based on applicable sanctions and export control
        requirements.
      </p>
    </main>
  </body>
</html>
